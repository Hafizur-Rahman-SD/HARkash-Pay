<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARKASH-PAY | Login</title>
  
</head>
<body class="screen">
  <div class="wrap">
    <div class="text-center mt-10">
      <div class="text-4xl font-black tracking-wide">HARKASH<span class="text-indigo-600">-PAY</span></div>
      <div class="muted mt-2">bKash-like demo experience (Frontend + LocalStorage)</div>
    </div>

    <div class="card-soft mt-8">
      <label class="font-semibold">Mobile Number</label>
      <input id="mobile" class="input-soft mt-2" placeholder="Enter 11 digit number" inputmode="numeric" />

      <label class="font-semibold mt-4 block">6 Digit PIN</label>
      <input id="pin" class="input-soft mt-2" placeholder="Enter 6 digit pin" inputmode="numeric" type="password" />

      <button id="btnLogin" class="brand-btn mt-5">Login</button>
      <button id="btnRegister" class="btn btn-outline w-full rounded-full mt-3">Create New Account (Demo)</button>

      <div class="muted mt-4">
        Demo note: same browser e data save thakbe. Different browser/device e আলাদা demo data হবে।
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/loginPage.js"></script>
</body>
</html>

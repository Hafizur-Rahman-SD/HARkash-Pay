<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payoo | Pay Bill</title>

  <link rel="shortcut icon" href="../assets/logo.png" type="image/x-icon">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * { font-family: "Outfit", sans-serif; }
  </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

  <header class="border-b border-base-300 sticky top-0 bg-base-200 z-10">
    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
      <div class="flex gap-2 items-center">
        <div class="w-14">
          <img src="../assets/logo.png" alt="logo" onerror="this.style.display='none'">
        </div>
        <div>
          <h2 class="text-2xl font-extrabold"><span id="balance">৳0</span></h2>
          <p class="text-neutral/60">Available Balance</p>
        </div>
      </div>

      <a href="./home.html" class="btn btn-soft">
        <i class="fa-solid fa-house"></i> Home
      </a>
    </section>
  </header>

  <section class="w-11/12 mx-auto py-6 space-y-4">
    <h2 class="text-3xl font-extrabold">Welcome to Pay<span class="text-primary">oo</span></h2>
    <p class="text-neutral/60">Enjoy easy and convenient financial services with us. Cashout charge is low.</p>

    <div class="grid grid-cols-3 gap-3">
      <a href="./add-money.html" class="btn flex-col h-full py-4 btn-soft">
        <img class="w-8" src="../assets/opt-1.png" alt="" onerror="this.style.display='none'">
        <p>Add Money</p>
      </a>
      <a href="./cashout.html" class="btn flex-col h-full py-4 btn-soft">
        <img class="w-8" src="../assets/opt-2.png" alt="" onerror="this.style.display='none'">
        <p>Cashout</p>
      </a>
      <a href="./transfer.html" class="btn flex-col h-full py-4 btn-soft">
        <img class="w-8" src="../assets/opt-3.png" alt="" onerror="this.style.display='none'">
        <p>Send Money</p>
      </a>
      <a href="./bonus.html" class="btn flex-col h-full py-4 btn-soft">
        <img class="w-8" src="../assets/opt-4.png" alt="" onerror="this.style.display='none'">
        <p>Get Bonus</p>
      </a>
      <a href="./pay-bill.html" class="btn flex-col h-full py-4 btn-primary btn-soft">
        <img class="w-8" src="../assets/opt-5.png" alt="" onerror="this.style.display='none'">
        <p>Pay Bill</p>
      </a>
      <a href="./transactions.html" class="btn flex-col h-full py-4 btn-soft">
        <img class="w-8" src="../assets/opt-6.png" alt="" onerror="this.style.display='none'">
        <p>Transactions</p>
      </a>
    </div>
  </section>

  <section class="w-11/12 mx-auto pb-10">
    <h2 class="text-xl font-bold mb-4">Pay Bill</h2>

    <div class="card bg-base-100 w-full shadow rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">

          <label class="label text-neutral font-bold">Select To Pay</label>
          <select id="billType" class="select w-full bg-base-200 rounded-full">
            <option disabled selected>Select back</option>
          </select>

          <label class="label text-neutral font-bold mt-2">Biller Account Number</label>
          <input id="billNo" type="text" class="input rounded-full bg-base-200 w-full"
            placeholder="Enter account number (min 6 digits)" />

          <label class="label text-neutral font-bold mt-2">Amount to Pay</label>
          <input id="amount" type="number" class="input rounded-full bg-base-200 w-full"
            placeholder="Add Amount to pay" />

          <label class="label text-neutral font-bold mt-2">6 Digit Pin</label>
          <input id="pin" type="password" maxlength="6"
            class="input rounded-full bg-base-200 w-full" placeholder="Enter 6 digit pin number" />

          <button id="btnPay" class="btn btn-primary mt-4 rounded-full">Pay Now</button>
        </fieldset>
      </div>
    </div>
  </section>

  <script type="module" src="../js/pages/payBillPage.js"></script>
</body>

</html>

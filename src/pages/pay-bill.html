<!doctype html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pay Bill</title></head>
<body class="screen">
  <div class="wrap">
    <div class="flex items-center justify-between">
      <a class="btn btn-sm btn-ghost" href="./home.html">← Back</a>
      <div class="font-bold">Pay Bill</div>
      <div></div>
    </div>

    <div class="card-soft mt-6">
      <label class="font-semibold">Bill Type</label>
      <select id="billType" class="select w-full mt-2 rounded-full"></select>

      <label class="font-semibold mt-4 block">Bill Number</label>
      <input id="billNo" class="input-soft mt-2" placeholder="At least 6 digits" inputmode="numeric"/>

      <label class="font-semibold mt-4 block">Amount</label>
      <input id="amount" class="input-soft mt-2" placeholder="e.g. 1200" inputmode="numeric"/>

      <label class="font-semibold mt-4 block">6 Digit PIN</label>
      <input id="pin" class="input-soft mt-2" placeholder="Enter 6 digit pin" type="password" inputmode="numeric"/>

      <button id="btnPay" class="brand-btn mt-5">Pay Bill</button>
    </div>
  </div>
  <script type="module" src="../js/pages/payBillPage.js"></script>
</body>
</html>
